{% extends "baselayout.html" %}
{% from 'bootstrap5/form.html' import render_form %}
{% block title %}PUTDATA{% endblock %}
{% block content %}
<h1>PUTDATA</h1>
{% if message %}
<p class="lead"><strong>{{ message }}</strong></p>
<p>Use Navbar to submit another invoice!</p>
{% else %}
<div class="container">
  <div class="row">
    <div class="col-md-10 col-lg-8 mx-lg-auto mx-md-auto">
      {{ render_form(form) }}
    </div>
  </div>
</div>
{% endif %}
{% endblock %}
